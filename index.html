<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redbook Notes</title>
  <style>
    :root {
      --page: #f8f6f2;
      --paper: #fffdfa;
      --ink: #24211d;
      --muted: #736b61;
      --line: #ded2c4;
      --green: #0f6b32;
      --blue: #1556a8;
      --shadow: 0 18px 44px rgba(57, 48, 37, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(222, 213, 201, .42) 1px, transparent 1px),
        linear-gradient(0deg, rgba(222, 213, 201, .34) 1px, transparent 1px),
        var(--page);
      background-size: 48px 48px;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1040px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 72px 0;
    }

    header {
      margin-bottom: 32px;
    }

    .eyebrow {
      color: var(--green);
      font-size: 15px;
      font-weight: 850;
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0 12px;
      font-size: clamp(42px, 7vw, 76px);
      line-height: 1.02;
    }

    .intro {
      max-width: 720px;
      margin: 0;
      color: var(--muted);
      font-size: 20px;
      font-weight: 650;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 34px;
    }

    .empty {
      display: block;
      min-height: 220px;
      padding: 28px;
      border: 1.5px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 253, 250, .86);
      color: inherit;
      box-shadow: var(--shadow);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 8px;
      background: #eef8ef;
      color: var(--green);
      font-size: 14px;
      font-weight: 850;
    }

    h2 {
      margin: 26px 0 12px;
      font-size: 30px;
      line-height: 1.22;
    }

    .meta {
      color: var(--blue);
      font-size: 16px;
      font-weight: 800;
    }

    .desc {
      margin-top: 18px;
      color: var(--muted);
      font-size: 17px;
      font-weight: 620;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="eyebrow">Redbook Notes</div>
      <h1>推荐算法笔记</h1>
      <p class="intro">这里收集可公开访问的 HTML 图文笔记。每篇笔记都是静态页面，可以直接用 GitHub Pages 发布和分享。</p>
    </header>

    <section class="grid" aria-label="笔记列表">
      <a class="empty" href="xiaohongshu-cockpit.html">
        <span class="tag">Execution Cockpit</span>
        <h2>小红书推荐算法 90 天执行驾驶舱</h2>
        <div class="meta">本地可编辑 · 可保存 · 可导出备份</div>
        <div class="desc">把账号基础设施、30 天发布计划、选题库、笔记模板和数据复盘放进一个每天能打开使用的工作台。</div>
      </a>
    </section>
  </main>
</body>
</html>
